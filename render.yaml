# Render.com deployment configuration for Nexora Shipping Backend
# Docs: https://render.com/docs/render-yaml

services:
  - type: web
    name: nexora-shipping-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx prisma db push && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard (Google Cloud SQL connection string)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # e.g. https://nexora-shipping.vercel.app
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false   # Paste entire service account JSON as a string
      - key: ADMIN_SETUP_SECRET
        sync: false   # A secret string you choose; used once to promote your account to ADMIN
      - key: ADMIN_EMAIL
        sync: false   # e.g. admin@nexorashipping.com  — the only email allowed to use admin login
      - key: ADMIN_PASSWORD
        sync: false   # e.g. MySecureAdminPass@2026  — plain text admin password checked server-side
